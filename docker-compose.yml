version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: storecraft
      POSTGRES_PASSWORD: storecraft_secret
      POSTGRES_DB: storecraft
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://storecraft:storecraft_secret@postgres:5432/storecraft
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-secret-key-change-me
    depends_on:
      - postgres

volumes:
  pgdata:
